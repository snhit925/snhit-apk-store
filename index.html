<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Instagram</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fafafa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:15px;
}

.card{
width:100%;
max-width:350px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
text-align:center;
}

.logo{
font-size:32px;
font-weight:bold;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.registerBtn{
background:#0095f6;
}

.loginBtn{
background:#28a745;
}

#msg{
margin-top:15px;
font-size:14px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<div class="logo">Mini Instagram</div>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="registerBtn" onclick="register()">
Create Account
</button>

<button class="loginBtn" onclick="login()">
Login
</button>

<p id="msg"></p>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,

}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDv0KqtYwTRBpEeONHF3trPPUIx0iRFBIw",

messagingSenderId: "1060098135153",
appId: "1:1060098135153:web:5e28b7e67312af593277d0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{
document.getElementById("msg").innerHTML =
"✅ Account Created";
})

.catch(error=>{
document.getElementById("msg").innerHTML =
"❌ " + error.message;
});

}

const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
