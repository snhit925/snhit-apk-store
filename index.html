<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Instagram</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fafafa;
}

/* AUTH */
#authPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:15px;
}

.card{
width:100%;
max-width:350px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
color:white;
border:none;
cursor:pointer;
}

.registerBtn{background:#0095f6;}
.loginBtn{background:#28a745;}

#msg{
margin-top:10px;
font-weight:bold;
}

/* FEED */
#feedPage{
display:none;
}

.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:white;
border-bottom:1px solid #ddd;
}

.logoutBtn{
background:red;
width:auto;
padding:8px 12px;
}

.stories{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

.storyCircle{
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(45deg,orange,red,purple);
padding:3px;
margin-right:10px;
}

.feed{
padding:10px;
padding-bottom:80px;
}

.post{
background:white;
margin-bottom:15px;
border-radius:10px;
overflow:hidden;
}

.post img{
width:100%;
}

.actions{
padding:10px;
font-size:20px;
}

.caption{
padding:10px;
}

/* PROFILE */
#profilePage{
display:none;
background:black;
min-height:100vh;
color:white;
padding:15px;
padding-bottom:80px;
}

.profile-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.profile-top{
display:flex;
align-items:center;
gap:25px;
}

.profile-pic-box img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
}

.profile-stats{
display:flex;
gap:25px;
text-align:center;
}

.profile-bio{
margin-top:20px;
}

.profile-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.profile-buttons button{
flex:1;
padding:10px;
background:#2a2a2a;
color:white;
border:none;
}

.profile-tabs{
display:flex;
justify-content:space-around;
margin-top:20px;
font-size:24px;
border-bottom:1px solid #333;
padding-bottom:10px;
}

.profile-posts-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:3px;
margin-top:10px;
}

.profile-posts-grid img{
width:100%;
height:120px;
object-fit:cover;
}

/* NAV */
.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
border-top:1px solid #ddd;
font-size:20px;
}

.bottomNav div{
cursor:pointer;
}
</style>
</head>

<body>

<!-- AUTH PAGE -->
<div id="authPage">
<div class="card">
<h2>Mini Instagram</h2>

<input id="username" type="text" placeholder="Username">
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="registerBtn" onclick="register()">Register</button>
<button class="loginBtn" onclick="login()">Login</button>

<p id="msg"></p>
</div>
</div>

<!-- FEED PAGE -->
<div id="feedPage">

<div class="topbar">
<h3>Home</h3>
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="stories">
<div class="storyCircle"></div>
<div class="storyCircle"></div>
<div class="storyCircle"></div>
</div>

<div class="feed">
<div class="post">
<img src="https://picsum.photos/500/300?1">
<div class="actions">❤️ 💬 📤</div>
<div class="caption">Hello Instagram 🚀</div>
</div>

<div class="post">
<img src="https://picsum.photos/500/300?2">
<div class="actions">❤️ 💬 📤</div>
<div class="caption">My First Post ❤️</div>
</div>
</div>

</div>

<!-- PROFILE PAGE -->
<div id="profilePage">

<div class="profile-header">
<span onclick="showFeed()">←</span>
<h2 id="profileUsername">username</h2>
<span>☰</span>
</div>

<div class="profile-top">
<div class="profile-pic-box">
<img src="https://picsum.photos/200">
</div>

<div class="profile-stats">
<div>
<h3>2</h3>
<p>Posts</p>
</div>

<div>
<h3>107</h3>
<p>Followers</p>
</div>

<div>
<h3>98</h3>
<p>Following</p>
</div>
</div>
</div>

<div class="profile-bio">
<h4 id="realName">User Name</h4>
<p id="userEmail">Email</p>
</div>

<div class="profile-buttons">
<button>Edit Profile</button>
<button>Share Profile</button>
</div>

<div class="profile-tabs">
<span>▦</span>
<span>▶</span>
<span>⟳</span>
<span>👤</span>
</div>

<div class="profile-posts-grid">
<img src="https://picsum.photos/200?1">
<img src="https://picsum.photos/200?2">
<img src="https://picsum.photos/200?3">
</div>

</div>

<!-- NAV -->
<div class="bottomNav">
<div onclick="showFeed()">🏠</div>
<div onclick="showProfile()">👤</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDv0KqtYwTRBpEeONHF3trPPUIx0iRFBIw",
authDomain: "mini-instagram-f7714.firebaseapp.com",
projectId: "mini-instagram-f7714",
storageBucket: "mini-instagram-f7714.firebasestorage.app",
messagingSenderId: "1060098135153",
appId: "1:1060098135153:web:5e28b7e67312af593277d0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const authPage = document.getElementById("authPage");
const feedPage = document.getElementById("feedPage");
const profilePage = document.getElementById("profilePage");

window.register = async function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await createUserWithEmailAndPassword(auth,email,password);

document.getElementById("msg").innerText="Registered Successfully";
};

window.login = async function(){
const email = document.getElementById("email").value;
const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,password);

document.getElementById("userEmail").innerText=email;
document.getElementById("profileUsername").innerText=username || "user";
document.getElementById("realName").innerText=username || "User";

showFeed();
};

window.logout = async function(){
await signOut(auth);
showAuth();
};

window.showFeed = function(){
authPage.style.display="none";
feedPage.style.display="block";
profilePage.style.display="none";
};

window.showProfile = function(){
feedPage.style.display="none";
profilePage.style.display="block";
};

window.showAuth = function(){
authPage.style.display="flex";
feedPage.style.display="none";
profilePage.style.display="none";
};

</script>

</body>
</html>
