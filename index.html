<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SNHIT Ludo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#111,#1b1b1b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:90%;
max-width:420px;
background:#222;
padding:30px;
border-radius:20px;
text-align:center;
border:2px solid #00ff88;
box-shadow:0 0 20px rgba(0,255,136,.4);
}

h1{
font-size:38px;
color:#00ff88;
margin-bottom:10px;
}

p{
opacity:.8;
margin-bottom:25px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.play{
background:#00ff88;
}

.room{
background:#2196f3;
color:white;
}

.join{
background:#ff9800;
color:white;
}

.setting{
background:#555;
color:white;
}

button:hover{
transform:scale(1.04);
}
</style>

</head>

<body>

<div class="container">

<h1>🎲 SNHIT Ludo</h1>

<p>No Ads • Online Multiplayer • Made By SNHIT</p>

<button class="play" onclick="playGame()">▶ Play</button>

<button class="room" onclick="createRoom()">👥 Create Room</button>

<button class="join" onclick="joinRoom()">🔑 Join Room</button>

<button class="setting" onclick="settings()">⚙ Settings</button>

</div>

<script>

function playGame(){
  document.body.innerHTML = `
    <h1>🎲 SNHIT Ludo Board</h1>
    <p>Board loading...</p>
  `;
}
function createRoom(){
alert("Create Room Coming Soon 🚀");
}

function joinRoom(){
alert("Join Room Coming Soon 🚀");
}

function settings(){
alert("Settings Coming Soon 🚀");
}

</script>

</body>
</html>
