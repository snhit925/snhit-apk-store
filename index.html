<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNHIT Ludo</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
text-align:center;
background:#222;
padding:25px;
border-radius:15px;
border:2px solid #00ff88;
width:90%;
max-width:420px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.play{background:#00ff88;}
.room{background:#2196f3;color:white;}
.join{background:#ff9800;color:white;}
.setting{background:#555;color:white;}
</style>

</head>

<body>

<div class="container">

<h1>🎲 SNHIT Ludo</h1>
<p>No Ads • Online Multiplayer</p>

<button class="play" onclick="playGame()">PLAY</button>
<button class="room">Create Room</button>
<button class="join">Join Room</button>
<button class="setting">Settings</button>

</div>

<script>

function playGame(){

document.body.innerHTML = `
<div style="text-align:center;background:#111;color:white;height:100vh;padding-top:20px;">

<button onclick="location.reload()" style="
position:absolute;left:10px;top:10px;
padding:8px;background:red;color:white;border:none;border-radius:6px;
">Back</button>

<h2 style="color:#00ff88;">SNHIT Ludo Board</h2>

<div style="
margin:20px auto;
width:300px;
height:300px;
display:grid;
grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);
background:#222;
border:3px solid #00ff88;
">

<!-- Homes -->
<div style="grid-column:1/7;grid-row:1/7;background:red;"></div>
<div style="grid-column:10/16;grid-row:1/7;background:green;"></div>
<div style="grid-column:1/7;grid-row:10/16;background:yellow;"></div>
<div style="grid-column:10/16;grid-row:10/16;background:blue;"></div>

<!-- Center -->
<div style="grid-column:7/10;grid-row:7/10;background:white;"></div>

<!-- Safe simple roads -->
<div style="grid-column:8;grid-row:1/16;background:#555;"></div>
<div style="grid-column:1/16;grid-row:8;background:#555;"></div>

</div>

<p>Board Loaded ✔</p>
<div id="diceBox" style="margin-top:20px;">
  <button onclick="rollDice()" style="
    padding:12px 20px;
    font-size:18px;
    background:#00ff88;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
  ">
    🎲 Roll Dice
  </button>

  <h2 id="diceResult" style="margin-top:10px;">Roll: -</h2>
</div>

<p>Board Loaded ✔</p>
</div>
`;

}

</script>

</body>
</html>
