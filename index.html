<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SNHIT Ludo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#111,#1b1b1b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:90%;
max-width:420px;
background:#222;
padding:30px;
border-radius:20px;
text-align:center;
border:2px solid #00ff88;
box-shadow:0 0 20px rgba(0,255,136,.4);
}

h1{
font-size:38px;
color:#00ff88;
margin-bottom:10px;
}

p{
opacity:.8;
margin-bottom:25px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.play{background:#00ff88;}
.room{background:#2196f3;color:white;}
.join{background:#ff9800;color:white;}
.setting{background:#555;color:white;}

button:hover{
transform:scale(1.04);
}
</style>

</head>

<body>

<div class="container">

<h1>🎲 SNHIT Ludo</h1>

<p>No Ads • Online Multiplayer • Made By SNHIT</p>

<button class="play" onclick="playGame()">▶️ Play</button>

<button class="room" onclick="createRoom()">👥 Create Room</button>

<button class="join" onclick="joinRoom()">🔑 Join Room</button>

<button class="setting" onclick="settings()">⚙ Settings</button>

</div>

<script>

function playGame(){
  document.body.innerHTML = `
  <div style="text-align:center;font-family:Arial;background:#111;color:white;min-height:100vh;">

    <button onclick="location.reload()" style="
      position:absolute;
      top:10px;
      left:10px;
      padding:10px;
      background:red;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">⬅ Back</button>

    <h2 style="color:#00ff88;padding:10px;">🎲 SNHIT Ludo Board</h2>

    <div style="
      width:360px;
      height:360px;
      margin:20px auto;
      display:grid;
      grid-template-columns:repeat(15,1fr);
      grid-template-rows:repeat(15,1fr);
      border:4px solid #00ff88;
      position:relative;
      background:#222;
    ">

      <!-- 🔴 RED HOME -->
      <div style="grid-column:1/7;grid-row:1/7;background:#ff4d4d;"></div>

      <!-- 🟢 GREEN HOME -->
      <div style="grid-column:10/16;grid-row:1/7;background:#2ecc71;"></div>

      <!-- 🟡 YELLOW HOME -->
      <div style="grid-column:1/7;grid-row:10/16;background:#f1c40f;"></div>

      <!-- 🔵 BLUE HOME -->
      <div style="grid-column:10/16;grid-row:10/16;background:#3498db;"></div>

      <!-- ⭐ CENTER -->
      <div style="grid-column:7/10;grid-row:7/10;background:white;"></div>

      <!-- 🛣️ VERTICAL ROAD -->
      <div style="grid-column:7/10;grid-row:1/16;background:#444;opacity:0.9;"></div>

      <!-- 🛣️ HORIZONTAL ROAD -->
      <div style="grid-column:1/16;grid-row:7/10;background:#444;opacity:0.9;"></div>

      <!-- 🟢 SAFE TILES -->
      <div style="grid-column:8;grid-row:2;background:#888;"></div>
      <div style="grid-column:8;grid-row:3;background:#888;"></div>
      <div style="grid-column:8;grid-row:4;background:#888;"></div>
      <div style="grid-column:8;grid-row:5;background:#888;"></div>

      <div style="grid-column:2;grid-row:8;background:#888;"></div>
      <div style="grid-column:3;grid-row:8;background:#888;"></div>
      <div style="grid-column:4;grid-row:8;background:#888;"></div>
      <div style="grid-column:5;grid-row:8;background:#888;"></div>

    </div>

    <p>✔ Clean Board Loaded</p>

  </div>
  `;
}

function createRoom(){
alert("Create Room Coming Soon 🚀");
}

function joinRoom(){
alert("Join Room Coming Soon 🚀");
}

function settings(){
alert("Settings Coming Soon 🚀");
}

</script>

</body>
</html>
