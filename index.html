<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Instagram</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{background:#fafafa;}

/* AUTH */
#authPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:15px;
}

.card{
width:100%;
max-width:350px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{color:white;border:none;cursor:pointer;}
.registerBtn{background:#0095f6;}
.loginBtn{background:#28a745;}

#msg{margin-top:10px;font-weight:bold;}

/* APP */
#app{
display:none;
}

/* TOP */
.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:white;
border-bottom:1px solid #ddd;
}

.logoutBtn{
background:red;
width:auto;
padding:8px 12px;
}

/* STORIES */
.stories{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

.storyCircle{
width:60px;height:60px;border-radius:50%;
background:linear-gradient(45deg,orange,red,purple);
padding:3px;
margin-right:10px;
}

/* FEED */
.feed{padding:10px;padding-bottom:80px;}

.post{
background:white;
margin-bottom:15px;
border-radius:10px;
overflow:hidden;
}

.post img{width:100%;}

.actions{padding:10px;font-size:20px;}

.caption{padding:10px;}

/* PROFILE */
#profilePage{
display:none;
padding:20px;
text-align:center;
}

.profileBox{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

/* BOTTOM NAV */
.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
border-top:1px solid #ddd;
font-size:20px;
}

.bottomNav div{
cursor:pointer;
}

</style>
</head>

<body>

<!-- AUTH -->
<div id="authPage">
<div class="card">
<h2>Mini Instagram</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="registerBtn" onclick="register()">Register</button>
<button class="loginBtn" onclick="login()">Login</button>

<p id="msg"></p>
</div>
</div>

<!-- APP -->
<div id="app">

<!-- HOME -->
<div id="homePage">

<div class="topbar">
<h3>Home</h3>
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="stories">
<div class="storyCircle"></div>
<div class="storyCircle"></div>
<div class="storyCircle"></div>
</div>

<div class="feed">

<div class="post">
<img src="https://picsum.photos/500/300?1">
<div class="actions">❤️ 💬 📤</div>
<div class="caption">Hello Instagram 🚀</div>
</div>

<div class="post">
<img src="https://picsum.photos/500/300?2">
<div class="actions">❤️ 💬 📤</div>
<div class="caption">My First Post ❤️</div>
</div>

</div>
</div>

<!-- PROFILE -->
<div id="profilePage">
<div class="profileBox">
<h2>My Profile 👤</h2>
<p id="userEmail">Email</p>
</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottomNav">
<div onclick="showHome()">🏠</div>
<div onclick="showProfile()">👤</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDv0KqtYwTRBpEeONHF3trPPUIx0iRFBIw",
authDomain: "mini-instagram-f7714.firebaseapp.com",
projectId: "mini-instagram-f7714",
storageBucket: "mini-instagram-f7714.firebasestorage.app",
messagingSenderId: "1060098135153",
appId: "1:1060098135153:web:5e28b7e67312af593277d0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const authPage = document.getElementById("authPage");
const appDiv = document.getElementById("app");
const userEmail = document.getElementById("userEmail");

window.register = async function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await createUserWithEmailAndPassword(auth,email,password);
document.getElementById("msg").innerText="Registered";
};

window.login = async function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,password);

authPage.style.display="none";
appDiv.style.display="block";

userEmail.innerText = email;
};

window.logout = async function(){
await signOut(auth);
authPage.style.display="flex";
appDiv.style.display="none";
};

window.showHome = function(){
document.getElementById("homePage").style.display="block";
document.getElementById("profilePage").style.display="none";
};

window.showProfile = function(){
document.getElementById("homePage").style.display="none";
document.getElementById("profilePage").style.display="block";
};

</script>

</body>
</html>
