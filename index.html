<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SNHIT Ludo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#111,#1b1b1b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:90%;
max-width:420px;
background:#222;
padding:30px;
border-radius:20px;
text-align:center;
border:2px solid #00ff88;
box-shadow:0 0 20px rgba(0,255,136,.4);
}

h1{
font-size:38px;
color:#00ff88;
margin-bottom:10px;
}

p{
opacity:.8;
margin-bottom:25px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.play{background:#00ff88;}
.room{background:#2196f3;color:white;}
.join{background:#ff9800;color:white;}
.setting{background:#555;color:white;}

button:hover{
transform:scale(1.04);
}
</style>

</head>

<body>

<div class="container">

<h1>🎲 SNHIT Ludo</h1>

<p>No Ads • Online Multiplayer • Made By SNHIT</p>

<button class="play" onclick="playGame()">▶️ Play</button>

<button class="room" onclick="createRoom()">👥 Create Room</button>

<button class="join" onclick="joinRoom()">🔑 Join Room</button>

<button class="setting" onclick="settings()">⚙ Settings</button>

</div>

<script type="module">

width:40px;
height:40px;

color:white;

z-index:999;

<h2 style="color:#00ff88;padding:10px;">🎲 SNHIT Ludo Board</h2>

<div style="
width:360px;
height:360px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);
border:4px solid #00ff88;
background:#222;

<div style="grid-column:8;grid-row:1/16;background:#555;"></div>

<div style="grid-column:8;grid-row:3;background:#888;"></div>
<div style="grid-column:8;grid-row:4;background:#888;"></div>
<div style="grid-column:8;grid-row:5;background:#888;"></div>

<div style="grid-column:2;grid-row:8;background:#888;"></div>
<div style="grid-column:3;grid-row:8;background:#888;"></div>
<div style="grid-column:4;grid-row:8;background:#888;"></div>
<div style="grid-column:5;grid-row:8;background:#888;"></div>

</div>

<p>✔ Firebase Connected</p>

</div>
`;

window.createRoom = function(){
alert("Firebase Connected ✅\nCreate Room next step");

window.joinRoom = function(){
alert("Join Room next step");
}

alert("Settings Coming Soon 🚀");

</body>
</html>
