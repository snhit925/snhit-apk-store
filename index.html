<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snhit Mini Insta</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fafafa;
transition:.3s;
}

.dark{
background:black;
color:white;
}

/* AUTH */
#authPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff416c,#ff4b2b,#6a11cb);
}

.card{
width:100%;
max-width:350px;
background:rgba(255,255,255,.15);
padding:25px;
border-radius:20px;
color:white;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

.registerBtn{background:#0095f6;}
.loginBtn{background:#28a745;}

/* PROFILE */
#profilePage{
display:none;
background:black;
min-height:100vh;
color:white;
padding:15px;
}

.menuBox{
display:none;
margin-top:10px;
background:#111;
padding:10px;
border-radius:10px;
}

.menuBox button{
background:red;
color:white;
}

/* MEME BATTLE */
#memeBattlePage{
display:none;
background:#111;
color:white;
min-height:100vh;
padding:20px;
}

#memeBattlePage input{
width:100%;
padding:12px;
margin-top:10px;
}

#memeBattlePage button{
width:100%;
padding:12px;
margin-top:10px;
background:#ff416c;
color:white;
border:none;
}

#playersList div{
display:flex;
gap:10px;
align-items:center;
background:#222;
padding:10px;
margin-top:10px;
border-radius:10px;
}

#playersList img{
width:40px;
height:40px;
border-radius:50%;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authPage">
<div class="card">
<h2>Snhit Mini Insta</h2>

<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="registerBtn" onclick="register()">Register</button>
<button class="loginBtn" onclick="login()">Login</button>
</div>
</div>

<!-- PROFILE -->
<div id="profilePage">

<div>
<span onclick="showFeed()">←</span>
<h2 id="profileUsername">User</h2>
<span onclick="toggleMenu()">☰</span>
</div>

<div id="menuBox" class="menuBox">
<button onclick="toggleTheme()">Dark Mode</button>
<button onclick="openMemeBattle()">🎭 Meme Battle</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<!-- MEME BATTLE -->
<div id="memeBattlePage">

<h2>🎭 Meme Battle</h2>

<input id="battleName" placeholder="Name">
<input id="battlePfp" placeholder="Profile Pic URL">

<button onclick="saveBattleProfile()">Save</button>

<button onclick="createLobby()">Create Lobby</button>

<input id="joinCode" placeholder="Join Code">
<button onclick="joinLobby()">Join Lobby</button>

<h3 id="lobbyCodeShow"></h3>
<div id="playersList"></div>

<button id="startGameBtn" style="display:none;" onclick="startGame()">Start</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
getDatabase,
ref,
set,
get,
onValue
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDv0KqtYwTRBpEeONHF3trPPUIx0iRFBIw",
authDomain:"mini-instagram-f7714.firebaseapp.com",
projectId:"mini-instagram-f7714",
storageBucket:"mini-instagram-f7714.firebasestorage.app",
messagingSenderId:"1060098135153",
appId:"1:1060098135153:web:5e28b7e67312af593277d0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentLobby=null;

/* AUTH */
window.register=async()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
localStorage.setItem(email.value,username.value);
};

window.login=async()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
showProfile();
};

window.logout=async()=>{
await signOut(auth);
showAuth();
};

/* NAV */
window.showFeed=()=>{
authPage.style.display="none";
profilePage.style.display="none";
memeBattlePage.style.display="none";
};

window.showAuth=()=>{
authPage.style.display="flex";
profilePage.style.display="none";
memeBattlePage.style.display="none";
};

window.showProfile=()=>{
profilePage.style.display="block";
authPage.style.display="none";
memeBattlePage.style.display="none";
};

/* MENU */
window.toggleMenu=()=>{
menuBox.style.display = menuBox.style.display==="block"?"none":"block";
}

window.toggleTheme=()=>{
document.body.classList.toggle("dark");
}

/* MEME BATTLE */
window.openMemeBattle=()=>{
profilePage.style.display="none";
memeBattlePage.style.display="block";
}

window.saveBattleProfile=()=>{
localStorage.setItem("battleName",battleName.value);
localStorage.setItem("battlePfp",battlePfp.value);
alert("Saved");
}

window.createLobby=async()=>{
let code=Math.random().toString(36).substring(2,7).toUpperCase();
currentLobby=code;

await set(ref(db,"lobby/"+code),{
host:auth.currentUser.uid,
players:{}
});

lobbyCodeShow.innerText=code;
listenLobby(code);
}

window.joinLobby=async()=>{
let snap=await get(ref(db,"lobby/"+joinCode.value));
if(!snap.exists()) return;

await set(ref(db,"lobby/"+joinCode.value+"/players/"+auth.currentUser.uid),{
name:localStorage.getItem("battleName"),
pfp:localStorage.getItem("battlePfp")
});

listenLobby(joinCode.value);
}

function listenLobby(code){
onValue(ref(db,"lobby/"+code),(snap)=>{
let data=snap.val();
if(!data) return;

playersList.innerHTML=
Object.values(data.players||{}).map(p=>
`<div><img src="${p.pfp}">${p.name}</div>`
).join("");

if(data.host===auth.currentUser.uid){
startGameBtn.style.display="block";
}
});
}

window.startGame=()=>{
set(ref(db,"lobby/"+currentLobby+"/status"),"started");
alert("Game Started");
}
</script>

</body>
</html>
