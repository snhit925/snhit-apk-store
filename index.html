</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyDv0KqtYwTRBpEeONHF3trPPUIx0iRFBIw",
authDomain:"mini-instagram-f7714.firebaseapp.com",
projectId:"mini-instagram-f7714",
storageBucket:"mini-instagram-f7714.firebasestorage.app",
messagingSenderId:"1060098135153",
appId:"1:1060098135153:web:5e28b7e67312af593277d0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const authPage = document.getElementById("authPage");
const feedPage = document.getElementById("feedPage");
const profilePage = document.getElementById("profilePage");

window.register = async function(){
const username = document.getElementById("username").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await createUserWithEmailAndPassword(auth,email,password);

localStorage.setItem(email, username);

document.getElementById("msg").innerText="Registered Successfully";
};

window.login = async function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,password);

const savedUsername = localStorage.getItem(email) || "user";

document.getElementById("userEmail").innerText=email;
document.getElementById("profileUsername").innerText=savedUsername;
document.getElementById("realName").innerText=savedUsername;

showFeed();
};

window.logout = async function(){
await signOut(auth);
showAuth();
};

window.showFeed = function(){
authPage.style.display="none";
feedPage.style.display="block";
profilePage.style.display="none";
};

window.showProfile = function(){
feedPage.style.display="none";
profilePage.style.display="block";
};

window.showAuth = function(){
authPage.style.display="flex";
feedPage.style.display="none";
profilePage.style.display="none";
};

window.toggleMenu = function(){
let menu=document.getElementById("menuBox");
menu.style.display = menu.style.display==="block" ? "none" : "block";
};

window.toggleTheme = function(){
document.body.classList.toggle("dark");
};
</script>

</body>
</html>
