<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snhit Mini Insta</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fafafa;
transition:.3s;
}

.dark{
background:black;
color:white;
}

.dark .topbar,
.dark .bottomNav,
.dark .post,
.dark .stories{
background:#111;
color:white;
border-color:#333;
}

/* AUTH */
#authPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:15px;
background:linear-gradient(135deg,#ff416c,#ff4b2b,#6a11cb);
}

.card{
width:100%;
max-width:350px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
text-align:center;
color:white;
}

.appLogo{
font-size:28px;
font-weight:bold;
background:linear-gradient(45deg,#fff,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
color:white;
border:none;
cursor:pointer;
}

.registerBtn{background:#0095f6;}
.loginBtn{background:#28a745;}

#msg{
margin-top:10px;
font-weight:bold;
}

/* FEED */
#feedPage{
display:none;
padding-bottom:80px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:white;
border-bottom:1px solid #ddd;
font-size:24px;
font-weight:bold;
}

.stories{
display:flex;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

.storyCircle{
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(45deg,orange,red,purple);
padding:3px;
}

.feed{
padding:10px;
}

.post{
background:white;
margin-bottom:15px;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.post img{
width:100%;
}

.actions{
padding:12px;
font-size:22px;
}

.caption{
padding:10px;
}

/* PROFILE */
#profilePage{
display:none;
background:black;
min-height:100vh;
color:white;
padding:15px;
padding-bottom:80px;
}

.profile-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.profile-top{
display:flex;
align-items:center;
gap:25px;
}

.profile-pic-box img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
}

.profile-stats{
display:flex;
gap:25px;
text-align:center;
}

.profile-bio{
margin-top:20px;
}

.profile-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.profile-buttons button{
flex:1;
padding:10px;
background:#2a2a2a;
color:white;
border:none;
}

.profile-tabs{
display:flex;
justify-content:space-around;
margin-top:20px;
font-size:24px;
border-bottom:1px solid #333;
padding-bottom:10px;
}

.profile-posts-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:3px;
margin-top:10px;
}

.menuBox{
display:none;
margin-top:15px;
background:#111;
padding:15px;
border-radius:10px;
}

.menuBox button{
background:red;
color:white;
}

/* NAV */
.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
border-top:1px solid #ddd;
font-size:22px;
}

.bottomNav div{
cursor:pointer;
}
</style>
</head>

<body>

<div id="authPage">
<div class="card">
<h2 class="appLogo">Snhit Mini Insta</h2>

<input id="username" type="text" placeholder="Username">
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="registerBtn" onclick="register()">Register</button>
<button class="loginBtn" onclick="login()">Login</button>

<p id="msg"></p>
</div>
</div>

<div id="feedPage">

<div class="topbar">
<span>＋</span>
<h3>Snhit Mini Insta</h3>
<span>♡</span>
</div>

<div class="stories">
<div class="storyCircle"></div>
</div>

<div class="feed">
<div class="post">
<img src="https://picsum.photos/500/300?1">
<div class="actions">❤️ 💬 📤</div>
<div class="caption">Hello Instagram 🚀</div>
</div>

<div class="post">
<img src="https://picsum.photos/500/300?2">
<div class="actions">❤️ 💬 📤</div>
<div class="caption">My First Post ❤️</div>
</div>
</div>
